<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Critical CSS will be inlined here by Vite -->
    <style>
      /* Critical CSS for initial render */
      html {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      body {
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        font-size: 1.2rem;
      }
    </style>
    
    <title>Bible.fi - DeFi Faith Platform</title>
    <meta name="description" content="The world's first Bible-based DeFi platform on Base chain. Invest with faith.">
    
    <!-- PWA meta tags -->
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="/manifest.json">
    
    <!-- Performance hints -->
    <link rel="dns-prefetch" href="//api.bible.fi">
    <link rel="dns-prefetch" href="//base.org">
  </head>
  <body>
    <div id="root">
      <div class="loading">Loading Bible.fi...</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
